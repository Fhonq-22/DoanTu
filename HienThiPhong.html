<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Hiển thị phòng</title>
</head>

<body>

    <div id="roomSelector">

        <h1>Xem phòng</h1>

        <input
            id="roomInput"
            placeholder="Nhập mã phòng"
        >

        <button id="btnJoinRoom">
            Xem phòng
        </button>

    </div>

    <div id="roomContent">

        <h2 id="roomInfo"></h2>

        <h1 id="word"></h1>

        <h3 id="pointValue"></h3>

        <h2 id="answer"></h2>

        <div id="charDisplay"></div>

        <div id="players"></div>

    </div>

    <script
        type="module"
        src="js/Views/HienThiPhongView.js"
    ></script>

</body>

</html>
