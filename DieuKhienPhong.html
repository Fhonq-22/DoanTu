<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Điều khiển phòng</title>
</head>

<body>

    <h1>Điều khiển phòng</h1>

    <h2 id="answer"></h2>

    <button id="btnNext">
        Từ mới
    </button>

    <button id="btnShow">
        Hiện đáp án
    </button>

    <div>

        <label>
            Điểm:
        </label>

        <input
            id="pointValue"
            type="number"
            value="1"
            min="0"
        >

    </div>

    <br>

    <div>

        <input
            id="playerName"
            placeholder="Tên người chơi"
        >

        <button id="btnAddPlayer">
            Thêm người chơi
        </button>

    </div>

    <br>

    <div id="players"></div>

    <script
        type="module"
        src="js/Views/DieuKhienPhongView.js"
    ></script>

</body>
</html>
