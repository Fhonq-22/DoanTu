<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Đoán Đi Là Gì?
    </title>

    <link
        rel="stylesheet"
        href="libs/uicons-solid-rounded.css"
    >

    <link
        rel="stylesheet"
        href="css/TrangChu.css"
    >

</head>

<body>

    <div class="container">

        <div class="hero">

            <div class="mascot">
                🤖
            </div>

            <h1>
                Đoán Đi
                <span>
                    Là Gì?
                </span>
            </h1>

            <p>
                Thử thách vốn từ của bạn
            </p>

        </div>

        <div class="mode-list">

            <button
                id="btnSoMang"
                class="mode-card"
            >

                <div class="emoji">
                    ❤️
                </div>

                <div class="title">
                    Đoán theo số mạng
                </div>

                <div class="desc">
                    Chơi tới khi hết mạng
                </div>

            </button>

            <button
                id="btnThoiGian"
                class="mode-card"
            >

                <div class="emoji">
                    ⏰
                </div>

                <div class="title">
                    Đoán theo thời gian
                </div>

                <div class="desc">
                    Đua với đồng hồ
                </div>

            </button>

            <button
                id="btnTatCa"
                class="mode-card"
            >

                <div class="emoji">
                    🌎
                </div>

                <div class="title">
                    Đoán tất cả
                </div>

                <div class="desc">
                    Không giới hạn
                </div>

            </button>

        </div>

        <div
            id="chonSoMang"
            class="option"
        >

            <button
                id="dongSoMang"
                class="cancel-btn"
            >
                ✕
            </button>

            <label for="soMang">
                Chọn số mạng
            </label>

            <select id="soMang">

                <option value="1">
                    1 ❤️
                </option>

                <option value="2">
                    2 ❤️
                </option>

                <option value="3">
                    3 ❤️
                </option>

                <option value="4">
                    4 ❤️
                </option>

                <option value="5">
                    5 ❤️
                </option>

            </select>

            <button
                id="xacNhanSoMang"
            >
                Bắt đầu
            </button>

        </div>

        <div
            id="chonThoiGian"
            class="option"
        >

            <button
                id="dongThoiGian"
                class="cancel-btn"
            >
                ✕
            </button>

            <label for="thoiGian">
                Chọn thời gian
            </label>

            <select id="thoiGian">

                <option value="15">
                    15 giây
                </option>

                <option value="30">
                    30 giây
                </option>

                <option value="45">
                    45 giây
                </option>

                <option value="60">
                    1 phút
                </option>

                <option value="120">
                    2 phút
                </option>

                <option value="180">
                    3 phút
                </option>

            </select>

            <button
                id="xacNhanThoiGian"
            >
                Bắt đầu
            </button>

        </div>

        <div class="overlay"></div>

    </div>

    <script
        type="module"
        src="js/Views/TrangChuView.js"
    ></script>

</body>
</html>
